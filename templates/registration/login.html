{% extends "rental/base.html" %}

{% block content %}
<div class="card narrow">
  <h1>ログイン</h1>

  {% if form.errors %}
    <p class="error">ユーザー名またはパスワードが違います。</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    <div class="form-row">
      <label>ユーザー名</label>
      {{ form.username }}
    </div>
    <div class="form-row">
      <label>パスワード</label>
      {{ form.password }}
    </div>
    <button class="btn primary" type="submit">ログイン</button>
  </form>
</div>
{% endblock %}
