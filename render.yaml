services:
  - type: web
    name: equipment-rental-django
    runtime: python
    plan: free
    region: singapore
    numInstances: 1
    healthCheckPath: /
    buildCommand: bash build.sh
    startCommand: gunicorn equipment_rental.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: DATABASE_URL
        sync: false
